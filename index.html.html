/* ══ 状態 ══ */
const LS_KEY="kakeibo_v1";
const DATA_VERSION="clean_start_1";
const FB_CFG_KEY="kakeibo_fb_cfg";

if(localStorage.getItem("kakeibo_data_ver")!==DATA_VERSION){

function loadState(){

function saveState(){

/* ══ Firebase同期 ══ */
let fbDb=null,fbAuth=null,fbUser=null,fbUnsub=null;
let fbSyncing=false,fbLastSync=null,fbError=null;

function loadFbConfig(){
  try{return JSON.parse(localStorage.getItem(FB_CFG_KEY))||null}catch(e){return null}
}

function initFirebase(config){
  if(typeof firebase==="undefined"){fbError="Firebase SDKが読み込まれていません";render();return;}
  try{
    if(!firebase.apps.length) firebase.initializeApp(config);
    else firebase.app(); // 既に初期化済み
    fbDb=firebase.firestore();
    fbAuth=firebase.auth();
    localStorage.setItem(FB_CFG_KEY,JSON.stringify(config));
    fbError=null;
    fbAuth.onAuthStateChanged(user=>{
      fbUser=user;
      if(user){
        loadFromFirestore();
        subscribeToChanges();
      } else {
        if(fbUnsub){fbUnsub();fbUnsub=null;}
      }
      render();
    });
  }catch(e){
    fbError="初期化エラー: "+e.message;
    render();
  }
}

async function loadFromFirestore(){
  if(!fbUser||!fbDb)return;
  try{
    fbSyncing=true;render();
    const doc=await fbDb.collection("users").doc(fbUser.uid).collection("kakeibo").doc("data").get();
    if(doc.exists){
      const d=doc.data();
      if(Array.isArray(d.transactions))S.transactions=d.transactions;
      if(Array.isArray(d.assets))S.assets=d.assets;
      localStorage.setItem(LS_KEY,JSON.stringify({transactions:S.transactions,assets:S.assets}));
    } else {
      /* クラウドに未保存 → ローカルのデータをアップロード */
      await saveToFirestore();
    }
    fbSyncing=false;fbLastSync=new Date();fbError=null;
  }catch(e){
    fbSyncing=false;fbError="読込エラー: "+e.message;
  }
  render();
}

async function saveToFirestore(){
  if(!fbUser||!fbDb)return;
  try{
    fbSyncing=true;
    await fbDb.collection("users").doc(fbUser.uid).collection("kakeibo").doc("data").set({
      transactions:S.transactions,assets:S.assets,
      updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
    });
    fbSyncing=false;fbLastSync=new Date();fbError=null;
  }catch(e){
    fbSyncing=false;fbError="保存エラー: "+e.message;
  }
}

function subscribeToChanges(){
  if(fbUnsub){fbUnsub();fbUnsub=null;}
  if(!fbUser||!fbDb)return;
  fbUnsub=fbDb.collection("users").doc(fbUser.uid).collection("kakeibo").doc("data")
    .onSnapshot(doc=>{
      /* 自分の書き込みは無視（pending writes = 自分の送信中） */
      if(!doc.exists||doc.metadata.hasPendingWrites)return;
      const d=doc.data();
      if(Array.isArray(d.transactions))S.transactions=d.transactions;
      if(Array.isArray(d.assets))S.assets=d.assets;
      fbLastSync=new Date();
      localStorage.setItem(LS_KEY,JSON.stringify({transactions:S.transactions,assets:S.assets}));
      render();
    },{error:e=>{fbError="同期エラー: "+e.message;render();}});
}

async function signInWithGoogle(){
  if(!fbAuth){fbError="Firebase未設定です";render();return;}
  try{
    const provider=new firebase.auth.GoogleAuthProvider();
    await fbAuth.signInWithPopup(provider);
  }catch(e){
    fbError="ログインエラー: "+e.message;render();
  }
}

async function doSignOut(){
  if(!fbAuth)return;
  if(fbUnsub){fbUnsub();fbUnsub=null;}
  await fbAuth.signOut();
  fbUser=null;fbLastSync=null;fbError=null;
  render();
}

/* ══ レンダリングヘルパー ══ */
function h(tag,attrs={},children=[]){
  const el=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
  });
  return el;
}
function div(s={},ch=[])  {return h("div",{style:s},ch)}
function span(s={},ch=[]) {return h("span",{style:s},ch)}
function btn(s={},ch=[],ev){return h("button",{style:s,onClick:ev},ch)}

/* ══ SVGチャート ══ */
function makeSVG(w,h){
  const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
  s.setAttribute("viewBox",`0 0 ${w} ${h}`);
  s.setAttribute("width","100%");
  s.setAttribute("height",h);
  return s;
}
function svgEl(tag,attrs){
  const e=document.createElementNS("http://www.w3.org/2000/svg",tag);
  Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
  return e;
}
function polar(cx,cy,r,deg){
  const rad=(deg-90)*Math.PI/180;
  return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)};
}
function donutChart(data,size,inner,outer){
  const svg=makeSVG(size,size);
  const cx=size/2,cy=size/2;
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total){
    const c=svgEl("circle",{cx,cy,r:outer,fill:"#E8E0D8"});
    const ci=svgEl("circle",{cx,cy,r:inner,fill:"#F0EBE5"});
    svg.appendChild(c);svg.appendChild(ci);return svg;
  }
  let angle=0;
  data.forEach(d=>{
    const slice=d.value/total*360;
    if(slice<1)return;
    const s=polar(cx,cy,outer,angle);
    const e=polar(cx,cy,outer,angle+slice-1);
    const si=polar(cx,cy,inner,angle);
    const ei=polar(cx,cy,inner,angle+slice-1);
    const lg=slice>180?1:0;
    const path=svgEl("path",{
      d:`M${s.x},${s.y} A${outer},${outer} 0 ${lg} 1 ${e.x},${e.y} L${ei.x},${ei.y} A${inner},${inner} 0 ${lg} 0 ${si.x},${si.y} Z`,
      fill:d.color,stroke:d.hl?"#FFFCF8":"none","stroke-width":d.hl?2.5:0
    });
    svg.appendChild(path);
    angle+=slice;
  });
  return svg;
}
function barChart(data,w,h){
  const svg=makeSVG(w,h);
  const pad={t:10,b:24,l:8,r:8};
  const cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  const maxVal=Math.max(...data.map(d=>Math.max(d.income,d.expense)),1);
  const gw=cw/data.length;
  const bw=Math.min(18,gw*0.35);
  /* グリッド線 */
  [0,.5,1].forEach(f=>{
    const y=pad.t+ch*(1-f);
    const l=svgEl("line",{x1:pad.l,y1:y,x2:w-pad.r,y2:y,stroke:"rgba(0,0,0,0.05)","stroke-dasharray":"3 3"});
    svg.appendChild(l);
  });
  data.forEach((d,i)=>{
    const x=pad.l+gw*i+gw/2;
    /* 収入バー */
    const ih=d.income/maxVal*ch;
    const ir=svgEl("rect",{x:x-bw-2,y:pad.t+ch-ih,width:bw,height:ih,fill:"#5B7F6E",rx:3});
    svg.appendChild(ir);
    /* 支出バー */
    const eh=d.expense/maxVal*ch;
    const er=svgEl("rect",{x:x+2,y:pad.t+ch-eh,width:bw,height:eh,fill:"#E07B54",rx:3});
    svg.appendChild(er);
    /* ラベル */
    const txt=svgEl("text",{x,y:h-5,"text-anchor":"middle","font-size":10,fill:"#9A8E88","font-family":"inherit"});
    txt.textContent=d.month;
    svg.appendChild(txt);
  });
  return svg;
}

/* ══ レシートスキャナー ══ */

/* 画像圧縮して processReceipt を呼ぶ */
function handleReceiptFile(file){
  if(!file)return;
  const url=URL.createObjectURL(file);
  const img=new Image();
  img.onload=function(){
    const canvas=document.createElement("canvas");
    let w=img.width,h=img.height;
    const max=1600;
    if(w>max||h>max){
      if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}
    }
    canvas.width=w;canvas.height=h;
    canvas.getContext("2d").drawImage(img,0,0,w,h);
    const b64=canvas.toDataURL("image/jpeg",0.85).split(",")[1];
    S.rcpt.imgSrc="data:image/jpeg;base64,"+b64;
    URL.revokeObjectURL(url);
    processReceipt(b64);
  };
  img.src=url;
}

/* Claude Vision API でOCR解析 */
async function processReceipt(b64){
  if(!S.apiKey){S.rcpt.phase="nokey";render();return;}
  S.rcpt.phase="scanning";render();
  const PROMPT="このレシートを解析してください。JSONのみ返してください（コードブロック・説明不要）:\n{\"storeName\":\"店名\",\"total\":合計金額(数値のみ),\"date\":\"YYYY-MM-DD形式\",\"catId\":\"food|eat_out|daily|trans|util|comm|medical|enjoy|fashion|edu|insur|other_e\",\"reason\":\"カテゴリ判定理由を1文で\",\"items\":[{\"name\":\"商品名\",\"price\":価格数値}]}";
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":S.apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true",
      },
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
          {type:"text",text:PROMPT}
        ]}]
      })
    });
    if(!res.ok)throw new Error("API エラー (HTTP "+res.status+")");
    const json=await res.json();
    const txt=json.content?.find(c=>c.type==="text")?.text||"";
    const clean=txt.replace(/```[a-z]*/gi,"").replace(/```/g,"").trim();
    S.rcpt.data=JSON.parse(clean);
    S.rcpt.phase="review";
  }catch(e){
    let msg=e.message;
    if(msg.includes("Failed to fetch")||msg.includes("CORS")||msg.includes("NetworkError")){
      msg="ブラウザのセキュリティにより直接API接続できません。\n\nターミナルで以下を実行しファイルをサーバー経由で開いてください：\n  python -m http.server 8080\n\nその後 http://localhost:8080/kakeibo.html を開いてください。";
    }
    S.rcpt.data={error:msg};
    S.rcpt.phase="review";
  }
  render();
}

function renderReceiptScanner(){
  const R=S.rcpt;
  const wrap=div({display:"flex",flexDirection:"column",height:"100vh",background:"#F0EBE5"});

  /* ── ヘッダー ── */
  const hdr=div({background:"linear-gradient(150deg,#3D2C24,#5C3D30)",padding:"40px 18px 20px",position:"relative",overflow:"hidden",flexShrink:"0"});
  hdr.appendChild(div({position:"absolute",top:"-40px",right:"-40px",width:"150px",height:"150px",borderRadius:"50%",background:"rgba(255,255,255,.04)"}));
  const tr=div({display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px",position:"relative",zIndex:"1"});
  const closeBtn=btn({background:"rgba(255,255,255,.15)",borderRadius:"9px",width:"32px",height:"32px",
    color:"#fff",fontSize:"16px",display:"flex",alignItems:"center",justifyContent:"center"},["×"],
    ()=>{R.show=false;R.phase="capture";R.imgSrc=null;R.data=null;render()});
  tr.appendChild(closeBtn);
  tr.appendChild(div({flex:"1",fontSize:"16px",fontWeight:"700",color:"#fff"},["📷 レシート読み取り"]));
  /* ステップバッジ */
  const phases=["撮影","解析","確認"];
  const phaseIdx={capture:0,nokey:0,scanning:1,review:2};
  const stepRow=div({display:"flex",gap:"4px"});
  phases.forEach((p,i)=>{
    const active=i===(phaseIdx[R.phase]||0);
    const past=i<(phaseIdx[R.phase]||0);

/* ══ CSV インポーター ══ */

/* CSV パーサー（ダブルクォート対応） */
function parseCSV(text){
  const rows=[];
  const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  lines.forEach(line=>{
    if(!line.trim())return;
    const row=[];let cur='';let inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(ch===','&&!inQ){row.push(cur.trim());cur='';}
      else cur+=ch;
    }
    row.push(cur.trim());
    if(row.some(c=>c))rows.push(row);
  });
  return rows;
}

/* 金額文字列 → 数値 */
function cleanAmt(s){
  if(!s)return 0;
  return parseInt(String(s).replace(/[¥,，円\s　]/g,'').replace(/[^\d]/g,''))||0;
}

/* メモからカテゴリを推測 */
function autoCategory(memo){
  const m=(memo||'').toLowerCase();
  if(/スーパー|マート|イオン|セブン|ファミマ|ローソン|ライフ|マルエツ|コープ|生協|食料品/.test(m))return'food';
  if(/カフェ|コーヒー|すき家|マクド|吉野家|松屋|ガスト|サイゼ|ラーメン|寿司|定食|ファミレス|レストラン|食堂/.test(m))return'eat_out';
  if(/電力|電気代|ガス代|水道|東電|関電|東ガス|大ガス|光熱/.test(m))return'util';
  if(/スイカ|パスモ|suica|pasmo|メトロ|jr|ｊｒ|電車|バス|タクシー|鉄道|交通/.test(m))return'trans';
  if(/ドコモ|docomo|ａｕ|softbank|ソフトバンク|携帯|スマホ|通信費|ntt/.test(m))return'comm';
  if(/薬局|ドラッグ|病院|クリニック|歯科|眼科|処方|調剤|医療/.test(m))return'medical';
  if(/保険|生命|損保|共済/.test(m))return'insur';
  if(/netflix|spotify|アマプラ|youtube|映画|ゲーム|娯楽/.test(m))return'enjoy';
  if(/給与|賞与|ボーナス|振込入金/.test(m))return'salary';
  if(/amazon|アマゾン|楽天市場|ヨドバシ|日用品|雑貨|ドンキ/.test(m))return'daily';
  return'other_e';
}

/* ヘッダー行を自動検出 */
function detectHeaderRow(rows){
  for(let i=0;i<Math.min(5,rows.length);i++){
    const r=rows[i].join('').toLowerCase();
    if(/日付|取引|date|金額|amount/.test(r))return i;
  }
  return 0;
}

/* カラムマッピング自動検出 */
function detectMapping(headers){
  const h=headers.map(s=>(s||'').toLowerCase().replace(/[（）()\s　]/g,''));
  const find=(...keys)=>{for(const k of keys){const i=h.findIndex(x=>x.includes(k));if(i>=0)return i;}return -1;};
  return{
    date:   find('日付','取引日','年月日','date','日'),
    memo:   find('摘要','内容','説明','件名','メモ','店名','description','摘要名称'),
    expense:find('出金','引出','支出','出金額','おひきだし','debit'),
    income: find('入金','入金額','収入','おあずけいれ','credit'),
    amount: find('金額','amount','利用金額','お支払金額'),
    typeCol:find('収支','種別','入出金','type'),
  };
}

/* プレビュー行を生成 */
function buildPreview(rows,headerRow,mapping){
  const preview=[];
  for(let i=headerRow+1;i<rows.length;i++){
    const row=rows[i];
    if(!row||row.every(c=>!c.trim()))continue;
    let date='',memo='',amount=0,type='expense';
    // 日付
    if(mapping.date>=0){
      let d=(row[mapping.date]||'').replace(/\//g,'-').replace(/年/g,'-').replace(/月/g,'-').replace(/日/g,'');
      const m=d.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
      date=m?`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`:today;
    }else date=today;
    // メモ
    memo=mapping.memo>=0?(row[mapping.memo]||''):'';
    // 金額・種別
    if(mapping.expense>=0||mapping.income>=0){
      const exp=cleanAmt(mapping.expense>=0?row[mapping.expense]:'');
      const inc=cleanAmt(mapping.income>=0?row[mapping.income]:'');
      if(inc>0){amount=inc;type='income';}
      else if(exp>0){amount=exp;type='expense';}
      else continue;
    }else if(mapping.amount>=0){
      amount=cleanAmt(row[mapping.amount]);
      if(amount===0)continue;
      type='expense';
    }else continue;
    // 収支カラムがある場合上書き
    if(mapping.typeCol>=0){
      const tc=(row[mapping.typeCol]||'').toLowerCase();
      if(/入金|収入|プラス|income|＋/.test(tc))type='income';
    }
    const catId=type==='income'?'salary':autoCategory(memo);
    preview.push({rowId:i,date,memo,type,amount,catId,skip:false});
  }
  return preview;
}

/* ファイル読み込みエントリ */
function handleCSVFile(file){
  if(!file)return;
  const C=S.csv;
  C.fileName=file.name;
  const reader=new FileReader();
  reader.onload=e=>{
    let text=e.target.result.replace(/^\uFEFF/,'');
    const rows=parseCSV(text);
    if(rows.length<2){alert('データが見つかりませんでした。文字コードを変えて再試行してください。');return;}
    const headerRow=detectHeaderRow(rows);
    const headers=rows[headerRow]||[];
    const mapping=detectMapping(headers);
    const preview=buildPreview(rows,headerRow,mapping);
    Object.assign(C,{raw:rows,headerRow,headers,mapping,preview,editId:null});
    C.phase=preview.length>0?'review':'mapping';
    render();
  };
  reader.readAsText(file,C.encoding);
}

/* CSV エクスポート */
function exportCSV(){
  const header='日付,種別,カテゴリ,メモ,金額（円）';
  const rows=[...S.transactions]
    .sort((a,b)=>b.date.localeCompare(a.date))
    .map(t=>{
      const c=cat(t.catId);
      const memo='"'+(t.memo||'').replace(/"/g,'""')+'"';
      return[t.date,t.type==='income'?'収入':'支出',c.l,memo,t.amount].join(',');
    });
  const csv=header+'\n'+rows.join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='kakeibo_'+today+'.csv';
  document.body.appendChild(a);a.click();
  setTimeout(()=>document.body.removeChild(a),500);
}

function renderCSVImporter(){
  const C=S.csv;

    si.appendChild(div({fontSize:'11px',color:'rgba(255,255,255,.7)',fontWeight:'600'},[ok+'件をインポート予定']));

  wrap.appendChild(hdr);

  /* ── スクロール本体：ヘッダー下をすべて使う ── */
  const savedScroll=C._scrollPos||0;
  const body=div({
    position:'absolute',
    left:'0',right:'0',bottom:'0',

  });

  body.addEventListener('scroll',()=>{C._scrollPos=body.scrollTop;},{passive:true});

  /* ヘッダーの実際の高さを測定してからtopを確定し、スクロール位置も復元 */
  requestAnimationFrame(()=>{
    const bodyEl=document.getElementById('csv-scroll-body');
    if(!bodyEl)return;
    const hdrEl=hdr; /* クロージャで参照 */
    if(hdrEl.offsetHeight>0){bodyEl.style.top=hdrEl.offsetHeight+'px';}

  });

  /* ══ upload ══ */
  if(C.phase==='upload'){
    const fi=h('input',{type:'file',accept:'.csv,.tsv,text/csv',style:{display:'none'}});
    fi.addEventListener('change',e=>{if(e.target.files[0])handleCSVFile(e.target.files[0])});
    const dropZone=btn({width:'100%',padding:'30px 20px',borderRadius:'20px',

      [span({fontSize:'52px'},['📂']),
       div({fontSize:'15px',fontWeight:'700',color:'#2A201C'},['CSVファイルを選択']),
       div({fontSize:'12px',color:'#9A8E88'},['タップしてファイルを開く'])],()=>fi.click());
    const dw=div({});dw.appendChild(fi);dw.appendChild(dropZone);body.appendChild(dw);

    /* 文字コード */

    ['UTF-8','Shift_JIS'].forEach(enc=>{

    [['🏦','三菱UFJ銀行','日付, 摘要, お引出し, お預入れ, 残高'],

    C.headers.forEach((colName,ci)=>{
      const row=div({display:'flex',alignItems:'center',gap:'10px',padding:'10px 14px',
        borderBottom:'1px solid rgba(200,185,170,.15)'});
      row.appendChild(div({width:'70px',fontSize:'11px',color:'#9A8E88',fontWeight:'600',flexShrink:'0',

      const sel=h('select',{style:{padding:'5px 8px',borderRadius:'8px',border:'1px solid rgba(200,185,170,.4)',

      [['（無視）',''],['日付','date'],['内容・メモ','memo'],['出金金額','expense'],

        const o=document.createElement('option');o.value=v;o.textContent=l;

  /* ══ review: 確認・修正 ══ */

    const skipRows=C.preview.filter(r=>r.skip);

    /* 統計 */

    [{l:'全件',v:C.preview.length,c:'#2A201C'},{l:'取込',v:validRows.length,c:'#4A7060'},
     {l:'スキップ',v:skipRows.length,c:'#9A8E88'}].forEach(s=>{

    /* 一括スキップ操作 */

    bulkRow.appendChild(btn({fontSize:'11px',color:'#4A7060',background:'rgba(91,127,110,.1)',
      borderRadius:'8px',padding:'5px 10px',fontWeight:'600'},['全選択'],()=>{C.preview.forEach(r=>r.skip=false);render()}));
    bulkRow.appendChild(btn({fontSize:'11px',color:'#C0614A',background:'rgba(192,97,74,.1)',
      borderRadius:'8px',padding:'5px 10px',fontWeight:'600'},['全スキップ'],()=>{C.preview.forEach(r=>r.skip=true);render()}));
    body.appendChild(bulkRow);

    /* 行リスト */
    const listWrap=div({background:'#FFFCF8',borderRadius:'15px',overflow:'hidden',
      border:'1px solid rgba(200,185,170,.3)'});

    C.preview.forEach((row,idx)=>{
      const c=cat(row.catId);
      const isEditing=C.editId===row.rowId;

          display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:'700',
          background:row.skip?'rgba(192,97,74,.12)':'rgba(91,127,110,.12)',
          border:'1.5px solid '+(row.skip?'rgba(192,97,74,.3)':'rgba(91,127,110,.25)'),

        chk.appendChild(document.createTextNode(row.skip?'✕':'✓'));
        chk.addEventListener('click',e=>{e.stopPropagation();row.skip=!row.skip;render()});
        compact.appendChild(chk);

        /* 日付 */
        compact.appendChild(div({fontSize:'10px',color:'#9A8E88',flexShrink:'0',width:'46px'},
          [row.date.slice(5).replace('-','/')]));

        /* カテゴリ絵文字 */
        compact.appendChild(div({width:'28px',height:'28px',borderRadius:'8px',flexShrink:'0',
          background:c.c+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px'},[c.e]));

        /* メモ */
        const memoEl=div({flex:'1',minWidth:'0'});
        memoEl.appendChild(div({fontSize:'12px',fontWeight:'600',color:'#2A201C',

        memoEl.appendChild(div({fontSize:'10px',color:'#9A8E88',marginTop:'1px'},[c.l]));
        compact.appendChild(memoEl);

        /* 金額 */
        compact.appendChild(div({fontSize:'12px',fontWeight:'700',flexShrink:'0',
          color:row.type==='income'?'#4A7060':'#2A201C'},
          [(row.type==='income'?'+':'−')+'¥'+fmt(row.amount)]));
        compact.appendChild(div({fontSize:'11px',color:'#D0C0B0',flexShrink:'0'},['›']));
        compact.addEventListener('click',()=>{
          C.editId=isEditing?null:row.rowId;
          render();
          /* 展開時に行が見えるようスクロール */
          if(!isEditing){
            requestAnimationFrame(()=>{
              document.getElementById('csv-expanded-row')
                ?.scrollIntoView({behavior:'smooth',block:'nearest'});
            });
          }
        });
        rowEl.appendChild(compact);

        /* 展開編集（IDを付けてスクロール先頭に来るようにする） */
        rowEl.id='csv-expanded-row';
        const editEl=div({padding:'13px',background:'rgba(92,61,48,.03)'});
        const eh=div({display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px'});
        eh.appendChild(div({fontSize:'12px',fontWeight:'700',color:'#2A201C'},['✏️ 編集中']));
        eh.appendChild(btn({background:'none',fontSize:'13px',color:'#9A8E88'},['閉じる ✕'],
          ()=>{C.editId=null;render()}));
        editEl.appendChild(eh);

        /* 日付 */
        editEl.appendChild(div({fontSize:'10px',color:'#9A8E88',marginBottom:'4px'},['日付']));
        const di=h('input',{type:'date',value:row.date,style:{width:'100%',padding:'9px 12px',
          borderRadius:'10px',border:'1.5px solid rgba(200,185,170,.4)',background:'#FFFCF8',
          fontSize:'14px',color:'#2A201C',outline:'none',marginBottom:'10px'}});
        di.addEventListener('change',e=>{row.date=e.target.value});
        editEl.appendChild(di);

        /* メモ */
        editEl.appendChild(div({fontSize:'10px',color:'#9A8E88',marginBottom:'4px'},['メモ']));
        const mi=h('input',{type:'text',value:row.memo,placeholder:'メモ',
          style:{width:'100%',padding:'9px 12px',borderRadius:'10px',border:'1.5px solid rgba(200,185,170,.4)',
            background:'#FFFCF8',fontSize:'14px',color:'#2A201C',outline:'none',marginBottom:'10px'}});
        mi.addEventListener('input',e=>{row.memo=e.target.value});
        editEl.appendChild(mi);

        /* 種別 + 金額 */
        const aqRow=div({display:'flex',gap:'8px',marginBottom:'10px',alignItems:'center'});
        const typeWrap=div({display:'flex',background:'rgba(200,185,170,.2)',borderRadius:'9px',padding:'3px',flexShrink:'0'});
        [['expense','支出'],['income','収入']].forEach(([t,l])=>{
          const active=row.type===t;

        ai.addEventListener('input',e=>{row.amount=parseInt(e.target.value)||0});
        aqRow.appendChild(ai);editEl.appendChild(aqRow);

        /* カテゴリ */
        editEl.appendChild(div({fontSize:'10px',color:'#9A8E88',marginBottom:'5px'},['カテゴリ']));

          const sel=row.catId===ct.id;
          cs.appendChild(btn({display:'flex',flexDirection:'column',alignItems:'center',gap:'3px',padding:'8px 5px',
            borderRadius:'10px',border:'2px solid '+(sel?ct.c:'rgba(200,185,170,.3)'),
            background:sel?ct.c+'18':'#FFFCF8',color:sel?ct.c:'#7A6E68',minWidth:'54px',flexShrink:'0'},
            [span({fontSize:'16px'},[ct.e]),span({fontSize:'9px',fontWeight:sel?'700':'400'},[ct.l])],
            ()=>{row.catId=ct.id;render()}));
        });
        editEl.appendChild(cs);

        /* スキップ */
        const sr=div({display:'flex',alignItems:'center',justifyContent:'space-between',
          marginTop:'11px',paddingTop:'11px',borderTop:'1px solid rgba(200,185,170,.2)'});
        sr.appendChild(div({fontSize:'12px',color:'#9A8E88'},['この行をスキップ']));
        const st=btn({width:'36px',height:'22px',borderRadius:'11px',position:'relative',
          background:row.skip?'#C0614A':'rgba(200,185,170,.3)',flexShrink:'0'},
          [div({width:'16px',height:'16px',borderRadius:'8px',background:'#fff',position:'absolute',
            top:'3px',left:row.skip?'17px':'3px',
            boxShadow:'0 1px 3px rgba(0,0,0,.2)',transition:'left .15s'})],
          ()=>{row.skip=!row.skip;render()});
        sr.appendChild(st);editEl.appendChild(sr);
        rowEl.appendChild(editEl);
      }
      listWrap.appendChild(rowEl);
    });
    body.appendChild(listWrap);

    body.appendChild(btn({padding:'16px',borderRadius:'15px',
      background:'linear-gradient(135deg,#5C3D30,#7A5040)',color:'#fff',fontSize:'16px',fontWeight:'700',
      boxShadow:'0 6px 20px rgba(92,61,48,.3)',letterSpacing:'.5px'},
      ['✓  '+validRows.length+'件をインポート'],()=>{
        validRows.forEach(row=>{
          S.transactions.unshift({id:Date.now()+Math.random(),type:row.type,catId:row.catId,
            memo:row.memo||'CSVインポート',amount:row.amount,date:row.date,isFixed:false});
        });
        saveState();C.importCount=validRows.length;C.phase='done';render();
      }));
    body.appendChild(btn({padding:'11px',borderRadius:'13px',background:'transparent',color:'#9A8E88',fontSize:'13px'},
      ['← ファイル選択に戻る'],()=>{C.phase='upload';C.raw=[];C.preview=[];C.editId=null;render()}));
  }

  /* ══ done: 完了 ══ */
  else if(C.phase==='done'){
    const db=div({display:'flex',flexDirection:'column',alignItems:'center',gap:'14px',padding:'32px 20px',textAlign:'center'});
    const circle=div({width:'76px',height:'76px',borderRadius:'50%',
      background:'linear-gradient(135deg,#5B7F6E,#4A7060)',
      display:'flex',alignItems:'center',justifyContent:'center',fontSize:'34px'});
    circle.className='pop-in';circle.appendChild(document.createTextNode('✓'));
    db.appendChild(circle);
    db.appendChild(div({fontSize:'19px',fontWeight:'700',color:'#2A201C'},[C.importCount+'件をインポートしました！']));
    db.appendChild(div({fontSize:'13px',color:'#9A8E88'},['取引履歴に反映されました']));
    db.appendChild(btn({padding:'14px 32px',borderRadius:'14px',
      background:'linear-gradient(135deg,#5C3D30,#7A5040)',color:'#fff',fontSize:'14px',fontWeight:'700',
      boxShadow:'0 4px 16px rgba(92,61,48,.28)',marginTop:'8px'},['履歴を見る'],()=>{
      C.show=false;C.phase='upload';C.raw=[];C.preview=[];
      S.tab='history';render();
    }));
    body.appendChild(db);
  }

  wrap.appendChild(body);

  /* ── スクロールボタン（確認・修正画面）── position:fixed で常に画面右に固定 */
  if(C.phase==='review'||C.phase==='mapping'){
    const sbWrap=div({
      position:'fixed',right:'14px',top:'50%',transform:'translateY(-50%)',
      display:'flex',flexDirection:'column',gap:'8px',zIndex:'700',
    });
    [['▲',-280],['▼',280]].forEach(([lbl,delta])=>{
      const b=btn({
        width:'44px',height:'44px',borderRadius:'50%',
        background:'rgba(255,252,248,0.97)',
        border:'1.5px solid rgba(200,185,170,.5)',
        boxShadow:'0 4px 14px rgba(90,60,40,.25)',
        display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:'18px',color:'#5C3D30',fontWeight:'900',lineHeight:'1',
        transition:'transform .08s, opacity .2s',
      },[lbl],()=>{
        const el=document.getElementById('csv-scroll-body');
        if(!el)return;
        const next=Math.max(0,Math.min(el.scrollTop+delta,el.scrollHeight-el.clientHeight));
        el.scrollTo({top:next,behavior:'smooth'});
        C._scrollPos=next;
      });
      b.addEventListener('touchstart',()=>{b.style.transform='scale(.88)';},{passive:true});
      b.addEventListener('touchend',()=>{b.style.transform='';});
      b.addEventListener('mousedown',()=>{b.style.transform='scale(.88)';});
      b.addEventListener('mouseup',()=>{b.style.transform='';});
      sbWrap.appendChild(b);
    });
    /* bodyのスクロールに応じてボタンの透明度を変化 */
    const updOp=()=>{
      const el=document.getElementById('csv-scroll-body');
      if(!el)return;
      sbWrap.children[0].style.opacity=el.scrollTop<=8?'0.25':'1';
      sbWrap.children[1].style.opacity=el.scrollTop+el.clientHeight>=el.scrollHeight-8?'0.25':'1';
    };
    body.addEventListener('scroll',updOp,{passive:true});
    requestAnimationFrame(updOp);
    /* ナビに隠れないようにドキュメントに直接追加 */
    document.body.appendChild(sbWrap);
    /* CSV閉じたときにボタンも消す（念のため） */
    const cleanupSb=()=>{if(sbWrap.parentNode)sbWrap.parentNode.removeChild(sbWrap);};
    closeBtn.addEventListener('click',cleanupSb,{once:true});
  }

  return wrap;
}

    /* サジェスト */
    const sugBox=div({position:"absolute",top:"100%",left:"0",right:"0",zIndex:"50",

    sugBox.appendChild(sugTitle);
    memoSec.appendChild(sugBox);

    function updateSuggest(val,box){
      while(box.children.length>1)box.removeChild(box.lastChild);
      if(!val.trim()){box.style.display="none";return}
      const res=S.transactions.filter(t=>t.memo.toLowerCase().includes(val.toLowerCase())).slice(0,4);

/* ══ 折れ線グラフ（資産推移） ══ */
function lineChart(data,w,h){
  const svg=makeSVG(w,h);
  const pad={t:16,b:28,l:14,r:14};
  const cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
  const keys=["cash","bank","invest"];
  const colors={"cash":"#E6B84A","bank":"#E07B54","invest":"#5B7F6E"};
  const maxVal=Math.max(...data.map(d=>d.total))*1.08;
  const minVal=Math.min(...data.map(d=>d.total))*0.92;
  const range=maxVal-minVal||1;
  const px=i=>pad.l+i*(cw/(data.length-1));
  const py=v=>pad.t+ch*(1-(v-minVal)/range);

  /* グリッド */
  [0,0.5,1].forEach(f=>{
    const y=pad.t+ch*(1-f);
    svg.appendChild(svgEl("line",{x1:pad.l,y1:y,x2:w-pad.r,y2:y,stroke:"rgba(0,0,0,0.05)","stroke-dasharray":"3 3"}));
    const lbl=svgEl("text",{x:pad.l-2,y:y+4,"text-anchor":"end","font-size":9,fill:"#B0A090","font-family":"inherit"});
    lbl.textContent=(minVal+range*f>=1000000?(((minVal+range*f)/10000)|0)+"万":"");
    svg.appendChild(lbl);
  });

  /* エリア塗り（total） */
  const areaPts=data.map((d,i)=>`${px(i)},${py(d.total)}`).join(" ");
  const areaPath=`M${pad.l},${pad.t+ch} L${areaPts.split(" ").map(p=>`${p.split(",")[0]},${p.split(",")[1]}`).join(" L")} L${w-pad.r},${pad.t+ch} Z`;
  svg.appendChild(svgEl("path",{d:areaPath,fill:"rgba(91,127,110,0.08)",stroke:"none"}));

  /* 積み上げエリア（現金） */
  const cashPts=data.map((d,i)=>`${px(i)},${py(minVal+d.cash*0.3)}`);
  // シンプルに total ラインのみ描画
  const linePts=data.map((d,i)=>`${px(i)},${py(d.total)}`).join(" L ");
  svg.appendChild(svgEl("path",{d:`M ${linePts}`,fill:"none",stroke:"#5B7F6E","stroke-width":2.5,"stroke-linecap":"round","stroke-linejoin":"round"}));

  /* データポイント */
  data.forEach((d,i)=>{
    const cx2=px(i),cy2=py(d.total);
    const outer=svgEl("circle",{cx:cx2,cy:cy2,r:5,fill:"#FFFCF8",stroke:"#5B7F6E","stroke-width":2.5});
    svg.appendChild(outer);
  });

  /* X軸ラベル */
  data.forEach((d,i)=>{
    const lbl=svgEl("text",{x:px(i),y:h-5,"text-anchor":"middle","font-size":9,fill:"#9A8E88","font-family":"inherit"});
    lbl.textContent=d.month;svg.appendChild(lbl);
  });

  return svg;
}

  const typeObj=ASSET_TYPES.find(t=>t.id===F.type)||ASSET_TYPES[0];

  const wrap=div({display:"flex",flexDirection:"column",height:"100vh",background:"#F0EBE5"});

  /* ── ヘッダー ── */
  const hdr=div({background:"linear-gradient(150deg,#3D2C24,#5C3D30)",padding:"40px 18px 0",position:"relative",overflow:"hidden",flexShrink:"0"});
  hdr.appendChild(div({position:"absolute",top:"-40px",right:"-40px",width:"150px",height:"150px",borderRadius:"50%",background:"rgba(255,255,255,0.04)"}));

  /* タイトルバー */
  const titleRow=div({display:"flex",alignItems:"center",gap:"12px",marginBottom:"20px",position:"relative",zIndex:"1"});
  const closeBtn=btn({background:"rgba(255,255,255,0.15)",borderRadius:"9px",width:"32px",height:"32px",
    color:"#fff",fontSize:"16px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0"},
    ["×"],()=>{S.showAssetForm=false;render()});
  titleRow.appendChild(closeBtn);
  titleRow.appendChild(div({flex:"1",fontSize:"16px",fontWeight:"700",color:"#fff"},[isEdit?"口座を編集":"口座を追加"]));
  if(isEdit){
    const delBtn=btn({background:"rgba(192,97,74,0.25)",border:"1px solid rgba(192,97,74,0.4)",
      borderRadius:"9px",padding:"5px 12px",fontSize:"12px",color:"#F4A087",fontWeight:"600"},
      ["削除"],()=>{S.confirmDeleteId=S.editingAsset.id;render()});
    titleRow.appendChild(delBtn);
  }
  hdr.appendChild(titleRow);

  /* 残高プレビュー */
  const preview=div({textAlign:"center",paddingBottom:"22px",position:"relative",zIndex:"1"});
  preview.appendChild(div({fontSize:"11px",color:"rgba(255,255,255,0.5)",marginBottom:"5px",letterSpacing:"1px"},["残高"]));
  preview.appendChild(div({fontSize:amount>9999999?"30px":amount>999999?"36px":"44px",fontWeight:"800",
    letterSpacing:"-1.5px",lineHeight:"1",
    color:amount===0?"rgba(255,255,255,0.25)":"#FFFCF8"},["¥"+fmt(amount)]));
  if(F.name) preview.appendChild(div({fontSize:"12px",color:"rgba(255,255,255,0.4)",marginTop:"5px"},[typeObj.emoji+" "+F.name]));
  hdr.appendChild(preview);
  wrap.appendChild(hdr);

  /* ── スクロールコンテンツ ── */
  const body=div({flex:"1",overflowY:"auto",padding:"14px",display:"flex",flexDirection:"column",gap:"13px"});
  body.className="slide-up";

  /* 種別選択 */
  const typeSec=div({});
  typeSec.appendChild(div({fontSize:"11px",color:"#9A8E88",fontWeight:"600",marginBottom:"8px",letterSpacing:"0.5px"},["種別"]));
  const typeGrid=div({display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"7px"});
  ASSET_TYPES.forEach(t=>{
    const sel=F.type===t.id;
    const b=btn({display:"flex",flexDirection:"column",alignItems:"center",gap:"5px",padding:"12px 6px",
      borderRadius:"13px",border:"2px solid "+(sel?t.color:"rgba(200,185,170,0.3)"),
      background:sel?t.color+"18":"#FFFCF8",
      color:sel?t.color:"#7A6E68",
      boxShadow:sel?"0 2px 10px rgba(90,60,40,0.15)":"0 1px 4px rgba(90,60,40,0.06)",
      transition:"all 0.15s"},
      [span({fontSize:"22px"},[t.emoji]),span({fontSize:"10px",fontWeight:sel?"700":"400"},[t.label])],
      ()=>{F.type=t.id;if(!F.color||F.color==="#E07B54")F.color=t.color;render()});
    typeGrid.appendChild(b);
  });
  typeSec.appendChild(typeGrid);body.appendChild(typeSec);

  /* 口座名 */
  const nameSec=div({});
  nameSec.appendChild(div({fontSize:"11px",color:"#9A8E88",fontWeight:"600",marginBottom:"6px",letterSpacing:"0.5px"},["口座名・名称"]));
  const nameInp=h("input",{type:"text",placeholder:"例）三菱UFJ銀行（普通）",value:F.name,
    style:{width:"100%",padding:"13px 15px",borderRadius:"13px",border:"2px solid rgba(200,185,170,0.4)",
      background:"#FFFCF8",fontSize:"15px",color:"#2A201C",outline:"none"}});
  nameInp.addEventListener("input",e=>{F.name=e.target.value;
    wrap.querySelector(".balance-name-preview")&&(wrap.querySelector(".balance-name-preview").textContent=typeObj.emoji+" "+e.target.value);
  });
  nameSec.appendChild(nameInp);body.appendChild(nameSec);

  /* 残高テンキー */
  const balSec=div({});
  balSec.appendChild(div({fontSize:"11px",color:"#9A8E88",fontWeight:"600",marginBottom:"8px",letterSpacing:"0.5px"},[isEdit?"現在の残高を入力":"残高"]));
  if(isEdit){
    const hint=div({background:"rgba(91,127,110,0.08)",border:"1px solid rgba(91,127,110,0.2)",
      borderRadius:"10px",padding:"8px 12px",marginBottom:"8px",fontSize:"12px",color:"#5A7060",
      display:"flex",alignItems:"center",gap:"6px"});
    hint.appendChild(span({fontSize:"14px"},["ℹ️"]));
    hint.appendChild(document.createTextNode("残高を手入力して「保存」を押すと更新されます"));
    balSec.appendChild(hint);
  }
  const kpad=div({display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"7px"});
  ["7","8","9","4","5","6","1","2","3","C","0","del"].forEach(k=>{
    const isSp=k==="del"||k==="C";
    const isClear=k==="C";
    const kb=btn({height:"54px",borderRadius:"12px",border:"1px solid rgba(200,185,170,0.45)",
      background:isClear?"rgba(192,97,74,0.08)":isSp?"#EDE8E2":"#FFFCF8",
      fontSize:isClear?"13px":"19px",fontWeight:"600",
      color:isClear?"#C0614A":isSp?"#7A6E68":"#2A201C",
      display:"flex",alignItems:"center",justifyContent:"center",
      boxShadow:"0 2px 5px rgba(90,60,40,0.07),0 1px 0 rgba(200,185,170,0.4) inset",
      border:isClear?"1px solid rgba(192,97,74,0.25)":"1px solid rgba(200,185,170,0.45)",
      transition:"transform 0.08s,background 0.08s"},
      [k==="del"?"⌫":k==="C"?"全消去":k],()=>{
        if(k==="del") F.balance=F.balance.length<=1?"0":F.balance.slice(0,-1);
        else if(k==="C") F.balance="0";
        else F.balance=F.balance==="0"?k:F.balance.length>=9?F.balance:F.balance+k;
        render();
      });
    kb.addEventListener("mousedown",()=>{
      kb.style.transform="scale(0.91)";
      kb.style.background=isClear?"rgba(192,97,74,0.18)":isSp?"#D8D3CC":"#EDE8E2";
    });
    kb.addEventListener("mouseup",()=>{
      kb.style.transform="";
      kb.style.background=isClear?"rgba(192,97,74,0.08)":isSp?"#EDE8E2":"#FFFCF8";
    });
    kpad.appendChild(kb);
  });
  balSec.appendChild(kpad);body.appendChild(balSec);

  /* カラー選択 */
  const colorSec=div({});
  colorSec.appendChild(div({fontSize:"11px",color:"#9A8E88",fontWeight:"600",marginBottom:"8px",letterSpacing:"0.5px"},["カラー"]));
  const colorGrid=div({display:"flex",gap:"8px",flexWrap:"wrap"});
  ASSET_COLORS.forEach(c=>{
    const sel=F.color===c;
    const cb=btn({width:"34px",height:"34px",borderRadius:"10px",background:c,
      border:sel?"3px solid #2A201C":"3px solid transparent",
      boxShadow:sel?"0 0 0 2px "+c+", 0 2px 8px rgba(0,0,0,0.15)":"0 1px 4px rgba(0,0,0,0.1)",
      transition:"all 0.15s",flexShrink:"0"},
      sel?[span({fontSize:"14px",color:"#fff",fontWeight:"700"},["✓"])]:[], ()=>{F.color=c;render()});
    colorGrid.appendChild(cb);
  });
  colorSec.appendChild(colorGrid);body.appendChild(colorSec);

  /* メモ（任意） */
  const memoSec=div({});
  memoSec.appendChild(div({fontSize:"11px",color:"#9A8E88",fontWeight:"600",marginBottom:"6px",letterSpacing:"0.5px"},["メモ（任意）"]));
  const memoInp=h("input",{type:"text",placeholder:"例）メイン口座、NISA年40万円枠 など",value:F.memo,
    style:{width:"100%",padding:"13px 15px",borderRadius:"13px",border:"2px solid rgba(200,185,170,0.4)",
      background:"#FFFCF8",fontSize:"14px",color:"#2A201C",outline:"none"}});
  memoInp.addEventListener("input",e=>{F.memo=e.target.value});
  memoSec.appendChild(memoInp);body.appendChild(memoSec);

  /* 保存ボタン */
  const canSave=F.name.trim()&&amount>0;
  const saveBtn=btn({padding:"16px",borderRadius:"15px",
    background:canSave?"linear-gradient(135deg,#5C3D30,#7A5040)":"#E8E0D8",
    color:canSave?"#fff":"#B0A090",fontSize:"16px",fontWeight:"700",
    boxShadow:canSave?"0 5px 18px rgba(92,61,48,0.28)":"none",
    transition:"all 0.2s"},
    [isEdit?"✓ 更新する":"✓ 追加する"],
    ()=>{
      if(!canSave)return;
      const a={
        id: isEdit?S.editingAsset.id:Date.now(),
        name:F.name.trim(), type:F.type,
        balance:amount, color:F.color, memo:F.memo,
      };
      if(isEdit){
        S.assets=S.assets.map(x=>x.id===a.id?a:x);
      } else {
        S.assets.push(a);
      }
      saveState();
      S.showAssetForm=false;
      render();
    });
  body.appendChild(saveBtn);
  wrap.appendChild(body);

  /* 削除確認ダイアログ */
  if(S.confirmDeleteId){
    const overlay=div({position:"fixed",inset:"0",background:"rgba(0,0,0,0.5)",zIndex:"400",
      display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"});
    const dialog=div({background:"#FFFCF8",borderRadius:"20px",padding:"24px",width:"100%",maxWidth:"340px",
      boxShadow:"0 16px 48px rgba(0,0,0,0.2)"});
    dialog.appendChild(div({fontSize:"16px",fontWeight:"700",color:"#2A201C",marginBottom:"8px",textAlign:"center"},["口座を削除しますか？"]));
    dialog.appendChild(div({fontSize:"13px",color:"#9A8E88",textAlign:"center",marginBottom:"20px",lineHeight:"1.6"},
      ["「"+S.editingAsset.name+"」を削除します。\nこの操作は元に戻せません。"]));
    const btnRow=div({display:"flex",gap:"10px"});
    const cancelBtn=btn({flex:"1",padding:"13px",borderRadius:"12px",background:"#F0EBE5",color:"#7A6E68",fontSize:"14px",fontWeight:"600"},
      ["キャンセル"],()=>{S.confirmDeleteId=null;render()});
    const deleteBtn=btn({flex:"1",padding:"13px",borderRadius:"12px",
      background:"linear-gradient(135deg,#C0614A,#A04030)",color:"#fff",fontSize:"14px",fontWeight:"700",
      boxShadow:"0 4px 14px rgba(192,97,74,0.35)"},
      ["削除する"],()=>{
        S.assets=S.assets.filter(a=>a.id!==S.confirmDeleteId);
        saveState();
        S.showAssetForm=false;S.editingAsset=null;S.confirmDeleteId=null;
        render();
      });
    btnRow.append(cancelBtn,deleteBtn);
    dialog.appendChild(btnRow);
    overlay.appendChild(dialog);
    wrap.appendChild(overlay);
  }

  return wrap;
}


function renderAssets(){
  const assets=S.assets;
  const total=assets.reduce((s,a)=>s+a.balance,0);
  const prevTotal=S.assetTrend[S.assetTrend.length-2]?.total||total;
  const diff=total-prevTotal;
  const diffPct=prevTotal>0?((diff/prevTotal)*100).toFixed(1):0;

  /* 種別集計 */
  const cashTotal=   assets.filter(a=>a.type==="cash").reduce((s,a)=>s+a.balance,0);
  const bankTotal=   assets.filter(a=>a.type==="bank").reduce((s,a)=>s+a.balance,0);
  const investTotal= assets.filter(a=>a.type==="investment"||a.type==="nisa").reduce((s,a)=>s+a.balance,0);
  const nisaTotal=   assets.filter(a=>a.type==="nisa").reduce((s,a)=>s+a.balance,0);

  /* 円グラフ用データ */
  const pieData=[
    {name:"現金",     value:cashTotal,   color:"#E6B84A"},
    {name:"銀行口座", value:bankTotal,   color:"#E07B54"},
    {name:"投資・NISA",value:investTotal,color:"#5B7F6E"},
  ].filter(d=>d.value>0);

  const wrap=div({paddingBottom:"90px"});

  /* ── ヘッダー ── */
  const hdr=div({background:"linear-gradient(145deg,#3D2C24,#5C3D30)",padding:"46px 18px 30px",position:"relative",overflow:"hidden"});
  hdr.appendChild(div({position:"absolute",top:"-40px",right:"-40px",width:"180px",height:"180px",borderRadius:"50%",background:"rgba(255,255,255,0.04)"}));
  hdr.appendChild(div({position:"absolute",bottom:"-20px",left:"40px",width:"80px",height:"80px",borderRadius:"50%",background:"rgba(255,255,255,0.03)"}));

  const hInner=div({position:"relative",zIndex:"1",textAlign:"center"});
  hInner.appendChild(div({color:"rgba(255,255,255,0.5)",fontSize:"11px",letterSpacing:"1px",marginBottom:"6px"},["総資産"]));
  hInner.appendChild(div({fontSize:"42px",fontWeight:"800",color:"#FFFCF8",letterSpacing:"-1.5px",lineHeight:"1"},["¥"+fmt(total)]));
  const diffRow=div({display:"flex",alignItems:"center",justifyContent:"center",gap:"10px",marginTop:"10px"});
  const diffBadge=div({
    background:diff>=0?"rgba(168,213,176,0.2)":"rgba(244,160,135,0.2)",
    border:"1px solid "+(diff>=0?"rgba(168,213,176,0.4)":"rgba(244,160,135,0.4)"),
    borderRadius:"10px",padding:"4px 12px",fontSize:"12px",fontWeight:"600",
    color:diff>=0?"#A8D5B0":"#F4A087",
  },[(diff>=0?"▲ +":"▼ ")+"¥"+fmt(Math.abs(diff))+" ("+diffPct+"%)"]);
  diffRow.appendChild(diffBadge);
  diffRow.appendChild(div({fontSize:"11px",color:"rgba(255,255,255,0.35)"},["先月比"]));
  hInner.appendChild(diffRow);

  /* 種別バー */
  const barWrap=div({marginTop:"18px"});
  const bar=div({display:"flex",gap:"3px",height:"10px",borderRadius:"5px",overflow:"hidden"});
  if(cashTotal>0)  bar.appendChild(div({flex:String(cashTotal),   background:"#E6B84A",borderRadius:"3px"}));
  if(bankTotal>0)  bar.appendChild(div({flex:String(bankTotal),   background:"#E07B54",borderRadius:"3px"}));
  if(investTotal>0)bar.appendChild(div({flex:String(investTotal), background:"#5B7F6E",borderRadius:"3px"}));
  barWrap.appendChild(bar);
  const barLeg=div({display:"flex",gap:"14px",justifyContent:"center",marginTop:"10px"});
  [["現金","#E6B84A",cashTotal],["銀行","#E07B54",bankTotal],["投資","#5B7F6E",investTotal]].forEach(([l,c,v])=>{
    if(v===0)return;
    const it=div({display:"flex",alignItems:"center",gap:"5px",fontSize:"11px",color:"rgba(255,255,255,0.6)"});
    it.appendChild(div({width:"8px",height:"8px",borderRadius:"2px",background:c}));
    it.appendChild(document.createTextNode(l+" "+Math.round(v/total*100)+"%"));
    barLeg.appendChild(it);
  });
  barWrap.appendChild(barLeg);
  hInner.appendChild(barWrap);
  hdr.appendChild(hInner);
  wrap.appendChild(hdr);

  const body=div({padding:"13px",display:"flex",flexDirection:"column",gap:"12px"});

  /* ── 種別サマリーカード（3列） ── */
  const summaryRow=div({display:"flex",gap:"8px"});
  [
    {l:"現金",e:"💵",c:"#E6B84A",v:cashTotal,  sub:"財布・貯金箱"},
    {l:"銀行口座",e:"🏦",c:"#E07B54",v:bankTotal, sub:assets.filter(a=>a.type==="bank").length+"口座"},
    {l:"投資・NISA",e:"📈",c:"#5B7F6E",v:investTotal,sub:"NISA ¥"+fmt(nisaTotal)},
  ].forEach(item=>{
    const card=div({flex:"1",padding:"13px 10px",textAlign:"center",borderRadius:"16px",
      background:"#FFFCF8",border:"1px solid rgba(200,185,170,0.3)",
      boxShadow:"0 2px 10px rgba(90,60,40,0.06)"});
    card.appendChild(div({fontSize:"20px",marginBottom:"5px"},[item.e]));
    card.appendChild(div({fontSize:"10px",color:"#9A8E88",marginBottom:"4px"},[item.l]));
    card.appendChild(div({fontSize:"13px",fontWeight:"700",color:"#2A201C",letterSpacing:"-0.3px"},["¥"+fmt(item.v)]));
    card.appendChild(div({fontSize:"9px",color:item.c,marginTop:"3px",fontWeight:"600"},[item.sub]));
    summaryRow.appendChild(card);
  });
  body.appendChild(summaryRow);

  /* ── 円グラフカード ── */
  const pieCard=div({});pieCard.className="card";
  pieCard.appendChild(div({fontSize:"14px",fontWeight:"700",color:"#2A201C",marginBottom:"14px"},["資産の内訳"]));
  const pieRow=div({display:"flex",alignItems:"center",gap:"16px"});
  /* 円グラフ（中央に総資産表示） */
  const chartWrap=div({position:"relative",width:"130px",height:"130px",flexShrink:"0"});
  chartWrap.appendChild(donutChart(pieData,130,38,60));
  const centerLabel=div({position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",
    textAlign:"center",pointerEvents:"none"});
  centerLabel.appendChild(div({fontSize:"9px",color:"#9A8E88"},["総資産"]));
  centerLabel.appendChild(div({fontSize:"12px",fontWeight:"700",color:"#2A201C"},["¥"+fmt(total)]));
  chartWrap.appendChild(centerLabel);
  pieRow.appendChild(chartWrap);
  /* 凡例 */
  const legend=div({flex:"1",display:"flex",flexDirection:"column",gap:"10px"});
  pieData.forEach(d=>{
    const row=div({display:"flex",alignItems:"center",gap:"9px"});
    row.appendChild(div({width:"10px",height:"10px",borderRadius:"3px",background:d.color,flexShrink:"0"}));
    const info=div({flex:"1"});
    info.appendChild(div({fontSize:"12px",color:"#5A4A44",fontWeight:"500"},[d.name]));
    info.appendChild(div({fontSize:"11px",color:"#9A8E88",marginTop:"1px"},["¥"+fmt(d.value)]));
    row.appendChild(info);
    const pct=div({fontSize:"13px",fontWeight:"700",color:d.color},[Math.round(d.value/total*100)+"%"]);
    row.appendChild(pct);
    legend.appendChild(row);
  });
  pieRow.appendChild(legend);
  pieCard.appendChild(pieRow);
  body.appendChild(pieCard);

  /* ── 推移グラフカード ── */
  const trendCard=div({});trendCard.className="card";
  const trendHdr=div({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"});
  trendHdr.appendChild(div({fontSize:"14px",fontWeight:"700",color:"#2A201C"},["資産推移（6ヶ月）"]));
  const trendDiff=div({fontSize:"12px",fontWeight:"600",color:diff>=0?"#4A7060":"#C0614A"},
    [(diff>=0?"▲ +":"▼ ")+"¥"+fmt(Math.abs(diff))]);
  trendHdr.appendChild(trendDiff);
  trendCard.appendChild(trendHdr);
  /* 折れ線グラフ */
  trendCard.appendChild(lineChart(S.assetTrend,390,160));
  /* 最高値・最低値バッジ */
  const maxTrend=Math.max(...S.assetTrend.map(d=>d.total));
  const minTrend=Math.min(...S.assetTrend.map(d=>d.total));
  const statsRow=div({display:"flex",gap:"8px",marginTop:"10px"});
  [{l:"最高値",v:maxTrend,c:"#4A7060",bg:"rgba(91,127,110,0.08)"},{l:"最低値",v:minTrend,c:"#C0614A",bg:"rgba(192,97,74,0.08)"}].forEach(s=>{
    const b=div({flex:"1",background:s.bg,borderRadius:"10px",padding:"8px 10px",textAlign:"center"});
    b.appendChild(div({fontSize:"10px",color:"#9A8E88"},[s.l]));
    b.appendChild(div({fontSize:"13px",fontWeight:"700",color:s.c},["¥"+fmt(s.v)]));
    statsRow.appendChild(b);
  });
  trendCard.appendChild(statsRow);
  body.appendChild(trendCard);

  /* ── 口座一覧（種別グループ） ── */
  const groups=[
    {key:"bank",      label:"銀行口座",  emoji:"🏦", color:"#E07B54"},
    {key:"investment",label:"投資口座",  emoji:"📊", color:"#5B7F6E"},
    {key:"nisa",      label:"NISA口座",  emoji:"🌱", color:"#7B8EC8"},
    {key:"cash",      label:"現金",      emoji:"💵", color:"#E6B84A"},
  ];

  groups.forEach(g=>{
    const grpAssets=assets.filter(a=>a.type===g.key);
    if(grpAssets.length===0)return;
    const grpTotal=grpAssets.reduce((s,a)=>s+a.balance,0);

    const section=div({});
    /* セクションヘッダー */
    const secHdr=div({display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px",padding:"0 2px"});
    secHdr.appendChild(div({fontSize:"15px"},[g.emoji]));
    secHdr.appendChild(div({flex:"1",fontSize:"13px",fontWeight:"600",color:"#5A4A44"},[g.label]));
    secHdr.appendChild(div({fontSize:"13px",fontWeight:"700",color:"#2A201C"},["¥"+fmt(grpTotal)]));
    section.appendChild(secHdr);

    /* 口座カード */
    const grpCard=div({background:"#FFFCF8",borderRadius:"16px",overflow:"hidden",
      boxShadow:"0 2px 10px rgba(90,60,40,0.07)",border:"1px solid rgba(200,185,170,0.3)"});
    grpAssets.forEach((a,i)=>{
      const pct=Math.round(a.balance/total*100);
      const row=div({padding:"13px 15px",borderBottom:"1px solid rgba(200,185,170,0.2)",cursor:"pointer"});
      row.addEventListener("click",()=>openAssetForm(a));
      /* 上段：色ドット + 名前 + 金額 + 編集アイコン */
      const top2=div({display:"flex",alignItems:"center",gap:"10px",marginBottom:"7px"});
      const dot=div({width:"10px",height:"10px",borderRadius:"3px",background:a.color,flexShrink:"0"});
      const nameWrap=div({flex:"1"});
      nameWrap.appendChild(div({fontSize:"13px",fontWeight:"600",color:"#2A201C"},[a.name]));
      if(a.memo) nameWrap.appendChild(div({fontSize:"10px",color:"#9A8E88",marginTop:"1px"},[a.memo]));
      const amtWrap=div({textAlign:"right"});
      amtWrap.appendChild(div({fontSize:"15px",fontWeight:"700",color:"#2A201C"},["¥"+fmt(a.balance)]));
      amtWrap.appendChild(div({fontSize:"10px",color:g.color,marginTop:"1px"},[pct+"%"]));
      const editIcon=div({width:"26px",height:"26px",borderRadius:"7px",background:"rgba(200,185,170,0.2)",
        display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",flexShrink:"0"},["✏️"]);
      top2.append(dot,nameWrap,amtWrap,editIcon);
      row.appendChild(top2);
      /* 下段：割合バー */

/* ══ 分析 ══ */
function renderChart(){
  const m=S.chartMonth;
  const mTxs=S.transactions.filter(t=>new Date(t.date).getMonth()===m);
  const income=mTxs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expense=mTxs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const catMap={};
  mTxs.filter(t=>t.type==="expense").forEach(t=>{catMap[t.catId]=(catMap[t.catId]||0)+t.amount});
  const pieData=Object.entries(catMap).map(([id,v])=>{const c=cat(id);return{name:c.l,value:v,color:c.c}}).sort((a,b)=>b.value-a.value);
  const TREND_D=[
    {month:"11月",income:510000,expense:298000},{month:"12月",income:520000,expense:341000},
    {month:"1月",income:495000,expense:288000},{month:"2月",income:530000,expense:305000},
    {month:"3月",income:510000,expense:321000},{month:"4月",income:520000,expense:312400},
  ];
  const wrap=div({paddingBottom:"90px"});
  wrap.appendChild(div({background:"linear-gradient(145deg,#3D2C24,#5C3D30)",padding:"48px 18px 20px"}));
  const body=div({padding:"13px",display:"flex",flexDirection:"column",gap:"11px"});

  /* 月選択 */
  const mrow=div({display:"flex",gap:"6px",overflowX:"auto",paddingBottom:"8px",WebkitOverflowScrolling:"touch"});
  MONTHS.forEach((ml,i)=>{
    const active=S.chartMonth===i;
    const b=btn({padding:"6px 13px",borderRadius:"10px",fontSize:"12px",fontWeight:"600",flexShrink:"0",
      background:active?"#5C3D30":"#FFFCF8",color:active?"#fff":"#7A6E68"},[ml],()=>{S.chartMonth=i;render()});
    mrow.appendChild(b);
  });
  body.appendChild(mrow);

  /* 収支サマリー3つ */
  const srow=div({display:"flex",gap:"9px"});
  [{l:"収入",v:income,c:"#4A7060"},{l:"支出",v:expense,c:"#C0614A"},{l:"収支",v:income-expense,c:income-expense>=0?"#4A7060":"#C0614A"}].forEach(item=>{
    const card=div({flex:"1",textAlign:"center"});card.className="card";
    card.appendChild(div({fontSize:"11px",color:"#9A8E88"},[item.l]));
    card.appendChild(div({fontSize:"15px",fontWeight:"700",color:item.c,marginTop:"3px"},["¥"+fmt(item.v)]));
    srow.appendChild(card);
  });
  body.appendChild(srow);

  /* 円グラフ */
  if(pieData.length>0){
    const pc=div({});pc.className="card";
    pc.appendChild(div({fontSize:"14px",fontWeight:"700",color:"#2A201C",marginBottom:"10px"},["支出カテゴリ別"]));
    const prow=div({display:"flex",alignItems:"center",gap:"14px"});
    const pw=div({width:"120px",height:"120px",flexShrink:"0"});pw.appendChild(donutChart(pieData,120,40,56));
    prow.appendChild(pw);
    const pl=div({flex:"1",display:"flex",flexDirection:"column",gap:"6px"});
    pieData.forEach(d=>{
      const row=div({display:"flex",alignItems:"center",gap:"7px"});
      row.appendChild(div({width:"7px",height:"7px",borderRadius:"2px",background:d.color,flexShrink:"0"}));
      row.appendChild(div({flex:"1",fontSize:"11px",color:"#5A4A44"},[d.name]));
      row.appendChild(div({fontSize:"11px",fontWeight:"600",color:"#2A201C"},["¥"+fmt(d.value)]));
      row.appendChild(div({fontSize:"10px",color:"#B0A090",width:"28px",textAlign:"right"},[expense>0?Math.round(d.value/expense*100)+"%":""]));
      pl.appendChild(row);
    });
    prow.appendChild(pl);pc.appendChild(prow);body.appendChild(pc);
  }

  /* 棒グラフ */
  const bc=div({});bc.className="card";
  bc.appendChild(div({fontSize:"14px",fontWeight:"700",color:"#2A201C",marginBottom:"10px"},["月別推移（6ヶ月）"]));
  bc.appendChild(barChart(TREND_D,390,155));
  const leg=div({display:"flex",gap:"14px",justifyContent:"center",marginTop:"6px"});
  [["収入","#5B7F6E"],["支出","#E07B54"]].forEach(([l,c])=>{
    const item=div({display:"flex",alignItems:"center",gap:"5px",fontSize:"11px",color:"#9A8E88"});
    item.appendChild(div({width:"10px",height:"10px",borderRadius:"2px",background:c}));
    item.appendChild(document.createTextNode(l));leg.appendChild(item);
  });
  bc.appendChild(leg);body.appendChild(bc);
  wrap.appendChild(body);return wrap;
}

  delRow.appendChild(btn({padding:"7px 14px",borderRadius:"9px",background:"rgba(192,97,74,.08)",
    color:"#C0614A",fontSize:"12px",fontWeight:"600",border:"1px solid rgba(192,97,74,.2)"},
    ["🗑️ 削除"],()=>{
      if(!confirm("全データを削除します。この操作は元に戻せません。"))return;
      S.transactions=[];S.assets=[];saveState();render();
    }));
  dataCard.appendChild(delRow);
  dataSection.appendChild(dataCard);
  body.appendChild(dataSection);

  /* アプリ情報 */
  body.appendChild(div({textAlign:"center",padding:"16px",fontSize:"11px",color:"#C0B0A0"},
    ["かけいぼ v1.0 · データはブラウザに保存されます"]));

  wrap.appendChild(body);return wrap;
}


function render(){
  const app=document.getElementById("app");
  while(app.firstChild)app.removeChild(app.firstChild);
  /* タイマークリア（スキャン中アニメ） */
  if(app._clearTimer){clearInterval(app._clearTimer);app._clearTimer=null;}
  let page;
  if(S.csv.show){
    page=renderCSVImporter();
    app.appendChild(page);
    return;
  }
  if(S.rcpt.show){
    page=renderReceiptScanner();
    app.appendChild(page);
    if(page._clearTimer)app._clearTimer=page._clearTimer;
    return;
  }
  if(S.showAssetForm){
    page=renderAssetForm();
    app.appendChild(page);
    return;
  }
  if(S.showInput){page=renderInput();}
  else{
    switch(S.tab){
      case"home":    page=renderHome();break;
      case"history": page=renderHistory();break;
      case"assets":  page=renderAssets();break;
      case"chart":   page=renderChart();break;
      case"settings":page=renderSettings();break;
      default:       page=renderHome();
    }
  }
  app.appendChild(page);
  if(!S.showInput||S.in.done)app.appendChild(renderNav());
  app.scrollTop=0;
}

render();
</script>
</body>
</html>
